<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product View</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  background:#1e88e5;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

/* SLIDER */
.slider{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.slider img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:10px;
  flex-shrink:0;
  cursor:pointer;
}

/* CARD */
.card{
  background:white;
  margin:12px;
  padding:12px;
  border-radius:12px;
}

.card h3{
  color:#1e88e5;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  color:white;
}

.whatsapp{background:#25D366;}
.back{background:#1e88e5;}

/* 🔥 FULL IMAGE POPUP */
#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#popup img{
  width:90%;
  max-height:80%;
  object-fit:contain;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">🛒 Product Details</div>

<div id="product">Loading...</div>

<!-- 🔥 IMAGE POPUP -->
<div id="popup" onclick="closePopup()">
  <img id="popupImg">
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const client = supabase.createClient(supabaseUrl, supabaseKey);

const id = new URLSearchParams(window.location.search).get("id");

load();

async function load(){

  const { data } = await client
    .from("products")
    .select("*")
    .eq("id", id)
    .single();

  if(!data){
    document.getElementById("product").innerHTML = "❌ Not Found";
    return;
  }

  let images = data.images || [data.image];

  let imgHtml = images.map(img =>
    `<img src="${img}" onclick="openPopup('${img}')">`
  ).join("");

  document.getElementById("product").innerHTML = `
    <div class="slider">
      ${imgHtml}
    </div>

    <div class="card">

      <h2>${data.name}</h2>
      <h3>₹${data.price}</h3>
      <p>${data.description || ''}</p>

      <button class="btn whatsapp" onclick="orderNow('${data.name}','${data.price}')">
        📲 Order on WhatsApp
      </button>

      <button class="btn back" onclick="history.back()">
        ⬅ Back
      </button>

    </div>
  `;
}

/* 🔥 OPEN IMAGE FULL */
function openPopup(img){
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupImg").src = img;
}

/* CLOSE POPUP */
function closePopup(){
  document.getElementById("popup").style.display = "none";
}

/* WHATSAPP */
function orderNow(name, price){

  let phone = "91XXXXXXXXXX";

  let msg = `Hello, I want to order:\n\nProduct: ${name}\nPrice: ₹${price}`;

  let url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;

  window.open(url, "_blank");
}

</script>

</body>
</html>
