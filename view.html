<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product View</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  background:#1e88e5;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.card{
  background:white;
  margin:12px;
  padding:12px;
  border-radius:12px;
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:10px;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  color:white;
}

.whatsapp{
  background:#25D366;
}

.back{
  background:#1e88e5;
}
</style>
</head>

<body>

<div class="header">🛒 Product Details</div>

<div id="product">Loading...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const client = supabase.createClient(supabaseUrl, supabaseKey);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

load();

async function load(){

  if(!id){
    document.getElementById("product").innerHTML = "❌ No ID Found";
    return;
  }

  const { data, error } = await client
    .from("products")
    .select("*")
    .eq("id", id)
    .single();

  console.log(data, error);

  if(error || !data){
    document.getElementById("product").innerHTML = "❌ Product Not Found";
    return;
  }

  document.getElementById("product").innerHTML = `
    <div class="card">

      <img src="${data.image || 'https://via.placeholder.com/300'}">

      <h2>${data.name || 'No Name'}</h2>

      <h3>₹${data.price || 0}</h3>

      <p>${data.description || 'No description available'}</p>

      <button class="btn whatsapp" onclick="orderNow('${data.name}','${data.price}')">
        📲 Order on WhatsApp
      </button>

      <button class="btn back" onclick="history.back()">
        ⬅ Back
      </button>

    </div>
  `;
}

/* WHATSAPP ORDER */
function orderNow(name, price){

  let phone = "91XXXXXXXXXX"; // 👉 अपना WhatsApp number डाल

  let msg = `Hello, I want to order:\n\nProduct: ${name}\nPrice: ₹${price}`;

  let url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;

  window.open(url, "_blank");
}

</script>

</body>
</html>
