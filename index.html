<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APNA BAZAR</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f6fa;
}

/* HEADER */
.header{
  background:white;
  padding:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

.logo{
  font-weight:bold;
  color:#ff3c7e;
}

.search{
  flex:1;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
}

/* CATEGORY */
.categories{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  background:white;
}

.cat{
  min-width:70px;
  text-align:center;
  font-size:12px;
  cursor:pointer;
}

.cat img{
  width:50px;
  height:50px;
  border-radius:50%;
  object-fit:cover;
}

/* FILTER */
.filters{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

.filters select{
  padding:6px;
  border-radius:8px;
}

/* 🔥 PRODUCTS (3 COLUMN) */
#products{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:8px;
  padding:10px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
}

/* 🔥 IMAGE FULL SHOW */
.card img{
  width:100%;
  height:100px;
  object-fit:contain;
  background:#fff;
}

.card h3{
  font-size:11px;
  margin:5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.card p{
  margin:5px;
  color:#ff3c7e;
  font-weight:bold;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">APNA BAZAR</div>
  <div class="search">
    <input type="text" id="search" placeholder="Search..." onkeyup="filterProducts()">
  </div>
</div>

<div class="categories" id="catScroll"></div>

<div class="filters">
  <select id="category" onchange="filterProducts()"></select>

  <select id="priceFilter" onchange="filterProducts()">
    <option value="">Price</option>
    <option value="0-99">0-99</option>
    <option value="0-299">0-299</option>
    <option value="300-599">300-599</option>
    <option value="599+">599+</option>
  </select>
</div>

<div id="products">Loading...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let allProducts = [];
let selectedCategory = "";

load();

/* LOAD DATA */
async function load(){
  const { data, error } = await client.from("products").select("*");

  if(error){
    document.getElementById("products").innerHTML = error.message;
    return;
  }

  allProducts = data || [];
  buildCategories();
  show(allProducts);
}

/* REAL CATEGORY BUILD */
function buildCategories(){

  let dropdown = document.getElementById("category");
  let scroll = document.getElementById("catScroll");

  dropdown.innerHTML = `<option value="">All</option>`;
  scroll.innerHTML = "";

  let map = {};

  allProducts.forEach(p=>{
    if(p.category){
      if(!map[p.category]){
        map[p.category] = p.category_image || p.image;
      }
    }
  });

  // ALL
  scroll.innerHTML += `
    <div class="cat" onclick="selectCategory('')">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png">
      <div>All</div>
    </div>
  `;

  Object.keys(map).forEach(c=>{
    dropdown.innerHTML += `<option value="${c}">${c}</option>`;

    scroll.innerHTML += `
      <div class="cat" onclick="selectCategory('${c}')">
        <img src="${map[c]}">
        <div>${c}</div>
      </div>
    `;
  });
}

/* SELECT CATEGORY */
function selectCategory(cat){
  selectedCategory = cat;
  document.getElementById("category").value = cat;
  filterProducts();
}

/* SHOW PRODUCTS */
function show(data){
  let box = document.getElementById("products");
  box.innerHTML = "";

  if(!data.length){
    box.innerHTML = "No Products";
    return;
  }

  data.forEach(p=>{
    box.innerHTML += `
      <div class="card" onclick="openProduct('${p.id}')">
        <img src="${p.image || 'https://via.placeholder.com/300'}">
        <h3>${p.name || ''}</h3>
        <p>₹${p.price || 0}</p>
      </div>
    `;
  });
}

/* FILTER */
function filterProducts(){

  let search = document.getElementById("search").value.toLowerCase();
  let category = selectedCategory || document.getElementById("category").value;
  let priceRange = document.getElementById("priceFilter").value;

  let filtered = allProducts.filter(p=>{

    let price = Number(p.price);
    let ok = true;

    if(priceRange==="0-99") ok = price<=99;
    else if(priceRange==="0-299") ok = price<=299;
    else if(priceRange==="300-599") ok = price>=300 && price<=599;
    else if(priceRange==="599+") ok = price>=599;

    return (!search || p.name?.toLowerCase().includes(search))
      && (!category || p.category===category)
      && ok;
  });

  show(filtered);
}

function openProduct(id){
  window.location.href = "view.html?id=" + id;
}
</script>

</body>
</html>
