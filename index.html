<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoping Portal</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  background:linear-gradient(135deg,#1e88e5,#1565c0);
  color:white;
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.card{
  background:white;
  margin:12px;
  padding:12px;
  border-radius:15px;
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:12px;
}

button.view{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#1e88e5;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">🛒 Shoping Finder</div>

<div id="products"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* SUPABASE CONFIG */
const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const supabase = supabase.createClient(supabaseUrl, supabaseKey);

window.onload = load;

/* LOAD PRODUCTS */
async function load(){

  const { data, error } = await supabase
    .from("products")
    .select("*")
    .order("id",{ascending:false});

  let box = document.getElementById("products");

  if(error){
    box.innerHTML = "❌ " + error.message;
    return;
  }

  if(!data || data.length === 0){
    box.innerHTML = "❌ No Products Found";
    return;
  }

  box.innerHTML = "";

  data.forEach(p=>{
    box.innerHTML += `
      <div class="card">

        <!-- FIXED: image column = image -->
        <img src="${p.image || 'https://via.placeholder.com/300'}">

        <h3>${p.name || ''}</h3>

        <p>₹${p.price || ''}</p>

        <button class="view" onclick="openProduct('${p.id}')">
          View Product
        </button>

      </div>
    `;
  });
}

function openProduct(id){
  window.location.href = "product.html?id=" + id;
}

</script>

</body>
</html>
