<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  background:#1e88e5;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

/* 🔥 ADD BUTTON STYLE AREA */
.top-btn{
  padding:10px;
  text-align:center;
}

.top-btn button{
  padding:10px 15px;
  border:none;
  background:#25D366;
  color:white;
  border-radius:10px;
  font-size:14px;
  cursor:pointer;
}

.filters{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.filters input, .filters select{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.price-box{
  display:flex;
  align-items:center;
  gap:10px;
}

#products{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:8px;
  padding:10px;
}

.card{
  background:white;
  padding:8px;
  border-radius:12px;
  cursor:pointer;
}

.card img{
  width:100%;
  height:90px;
  object-fit:contain;
  border-radius:10px;
}

.card h3{
  font-size:12px;
  margin:5px 0;
}

.card p{
  margin:0;
  font-size:13px;
  font-weight:bold;
  color:#1e88e5;
}
</style>
</head>

<body>

<div class="header">🛒 Products</div>

<!-- 🔥 ADD PRODUCT BUTTON -->
<div class="top-btn">
  <button onclick="window.location.href='login.html'">
    ➕ Add Product
  </button>
</div>

<div class="filters">

  <input type="text" id="search" placeholder="🔍 Search product..." onkeyup="filterProducts()">

  <select id="category" onchange="filterProducts()">
    <option value="">All Categories</option>
  </select>

  <div class="price-box">
    <input type="range" id="price" min="0" max="10000" value="10000"
    oninput="updatePrice(); filterProducts()">
    <span id="priceText">₹10000</span>
  </div>

</div>

<div id="products">Loading...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let allProducts = [];

load();

async function load(){

  const { data, error } = await client
    .from("products")
    .select("*");

  if(error){
    document.getElementById("products").innerHTML = error.message;
    return;
  }

  allProducts = data || [];

  loadCategories();
  show(allProducts);
}

/* CATEGORY */
function loadCategories(){

  let box = document.getElementById("category");
  box.innerHTML = `<option value="">All Categories</option>`;

  let cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))];

  cats.forEach(c=>{
    box.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

/* SHOW */
function show(data){

  let box = document.getElementById("products");
  box.innerHTML = "";

  if(!data.length){
    box.innerHTML = "❌ No Products Found";
    return;
  }

  data.forEach(p=>{
    box.innerHTML += `
      <div class="card" onclick="openProduct('${p.id}')">
        <img src="${p.image || 'https://via.placeholder.com/300'}">
        <h3>${p.name || ''}</h3>
        <p>₹${p.price || 0}</p>
      </div>
    `;
  });
}

/* FILTER */
function filterProducts(){

  let search = document.getElementById("search").value.toLowerCase();
  let category = document.getElementById("category").value;
  let price = Number(document.getElementById("price").value);

  let filtered = allProducts.filter(p =>
    (!search || (p.name && p.name.toLowerCase().includes(search))) &&
    (!category || p.category === category) &&
    (!price || Number(p.price) <= price)
  );

  show(filtered);
}

/* PRICE */
function updatePrice(){
  document.getElementById("priceText").innerText =
    "₹" + document.getElementById("price").value;

  filterProducts();
}

/* VIEW PAGE */
function openProduct(id){
  window.location.href = "view.html?id=" + id;
}

</script>

</body>
</html>
