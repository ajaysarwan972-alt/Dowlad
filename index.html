<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoping App</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7}

.header{
  background:linear-gradient(135deg,#43a047,#2e7d32);
  color:white;
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.card{
  background:white;
  margin:12px;
  padding:12px;
  border-radius:15px;
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:12px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#43a047;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">🛒 Shoping App</div>

<div id="products"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const supabase = supabase.createClient(supabaseUrl, supabaseKey);

window.onload = load;

async function load(){

  const { data } = await supabase
    .from("products")
    .select("*")
    .order("id",{ascending:false});

  let box = document.getElementById("products");
  box.innerHTML = "";

  data.forEach(p=>{
    box.innerHTML += `
      <div class="card">

        <img src="${p.image_url}">

        <h3>${p.name}</h3>

        <p>₹${p.price}</p>

        <button onclick="openProduct('${p.id}')">
          View Product
        </button>

      </div>
    `;
  });
}

function openProduct(id){
  window.location.href = "product.html?id=" + id;
}

</script>

</body>
</html>
