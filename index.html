<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  background:#1e88e5;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.card{
  background:white;
  margin:12px;
  padding:12px;
  border-radius:12px;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">🛒 Products</div>

<div id="products">Loading...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const supabase = supabase.createClient(supabaseUrl, supabaseKey);

load();

async function load(){

  const { data, error } = await supabase
    .from("products")
    .select("*");

  console.log(data, error);

  let box = document.getElementById("products");

  if(error){
    box.innerHTML = "❌ " + error.message;
    return;
  }

  if(!data || data.length === 0){
    box.innerHTML = "❌ No Products Found";
    return;
  }

  box.innerHTML = "";

  data.forEach(p=>{
    box.innerHTML += `
      <div class="card">

        <img src="${p.image || 'https://via.placeholder.com/300'}">

        <h3>${p.name}</h3>

        <p>₹${p.price}</p>

      </div>
    `;
  });
}

</script>

</body>
</html>
