<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APNA BAZAR</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f6fa;
}

.header{
  background:linear-gradient(135deg,#ff3c7e,#ff6b3d);
  color:white;
  padding:16px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.top-btn{
  padding:10px;
  text-align:center;
}

.top-btn button{
  padding:10px 18px;
  border:none;
  background:linear-gradient(135deg,#25D366,#1ebe57);
  color:white;
  border-radius:25px;
  font-weight:bold;
  cursor:pointer;
}

.filters{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.filters input, .filters select{
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

#products{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:8px;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card img{
  width:100%;
  height:90px;
  object-fit:contain;
  background:#fff;
}

.card h3{
  font-size:11px;
  margin:5px;
}

.card p{
  margin:5px;
  font-size:12px;
  font-weight:bold;
  color:#ff3c7e;
}
</style>
</head>

<body>

<div class="header">🛍️ APNA BAZAR</div>

<div class="top-btn">
  <button onclick="window.location.href='login.html'">
    ➕ Add Product
  </button>
</div>

<div class="filters">

  <input type="text" id="search" placeholder="🔍 Search product..." onkeyup="filterProducts()">

  <select id="category" onchange="filterProducts()">
    <option value="">All Categories</option>
  </select>

  <select id="priceFilter" onchange="filterProducts()">
    <option value="">All Prices</option>
    <option value="0-99">0 - 99</option>
    <option value="0-299">0 - 299</option>
    <option value="300-599">300 - 599</option>
    <option value="599+">599+</option>
  </select>

</div>

<div id="products">Loading...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* SUPABASE CONFIG */
const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJFf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let allProducts = [];

load();

async function load(){

  const { data, error } = await client
    .from("products")
    .select("*");

  if(error){
    document.getElementById("products").innerHTML = error.message;
    return;
  }

  allProducts = data || [];

  loadCategories();
  show(allProducts);
}

/* CATEGORY */
function loadCategories(){

  let box = document.getElementById("category");
  box.innerHTML = `<option value="">All Categories</option>`;

  let cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))];

  cats.forEach(c=>{
    box.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

/* SHOW PRODUCTS */
function show(data){

  let box = document.getElementById("products");
  box.innerHTML = "";

  if(!data.length){
    box.innerHTML = "❌ No Products Found";
    return;
  }

  data.forEach(p=>{
    box.innerHTML += `
      <div class="card" onclick="openProduct('${p.id}')">
        <img src="${p.image || 'https://via.placeholder.com/300'}">
        <h3>${p.name || ''}</h3>
        <p>₹${p.price || 0}</p>
      </div>
    `;
  });
}

/* FILTER */
function filterProducts(){

  let search = document.getElementById("search").value.toLowerCase();
  let category = document.getElementById("category").value;
  let priceRange = document.getElementById("priceFilter").value;

  let filtered = allProducts.filter(p => {

    let price = Number(p.price);
    let ok = true;

    if(priceRange === "0-99") ok = price <= 99;
    else if(priceRange === "0-299") ok = price <= 299;
    else if(priceRange === "300-599") ok = price >= 300 && price <= 599;
    else if(priceRange === "599+") ok = price >= 599;

    return (!search || p.name?.toLowerCase().includes(search))
      && (!category || p.category === category)
      && ok;
  });

  show(filtered);
}

/* OPEN PRODUCT */
function openProduct(id){
  window.location.href = "view.html?id=" + id;
}

</script>

</body>
</html>
