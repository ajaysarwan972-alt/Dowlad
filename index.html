<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APNA BAZAR</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f6fa;
}

/* HEADER */
.header{
  background:white;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.logo{
  font-weight:bold;
  color:#ff3c7e;
  font-size:18px;
}

.search{
  flex:1;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
}

/* CATEGORY SCROLL */
.categories{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  background:white;
}

.cat{
  min-width:70px;
  text-align:center;
  font-size:12px;
}

.cat img{
  width:50px;
  height:50px;
  border-radius:50%;
}

/* BANNER */
.banner{
  background:#ff3c7e;
  color:white;
  text-align:center;
  padding:10px;
  font-weight:bold;
}

/* FILTER BAR */
.filters{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  border-top:1px solid #eee;
  border-bottom:1px solid #eee;
}

.filters select{
  padding:6px;
  border-radius:8px;
}

/* PRODUCTS GRID */
#products{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card h3{
  font-size:13px;
  margin:6px;
}

.card p{
  margin:6px;
  font-weight:bold;
  color:#ff3c7e;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 -2px 6px rgba(0,0,0,0.1);
}

.bottom-nav div{
  text-align:center;
  font-size:12px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">APNA BAZAR</div>
  <div class="search">
    <input type="text" id="search" placeholder="Search products..." onkeyup="filterProducts()">
  </div>
</div>

<!-- CATEGORY -->
<div class="categories">
  <div class="cat">All</div>
  <div class="cat">Men</div>
  <div class="cat">Women</div>
  <div class="cat">Kids</div>
  <div class="cat">Electronics</div>
</div>

<!-- BANNER -->
<div class="banner">
  🔥 Sunday Sale - Upto 70% OFF
</div>

<!-- FILTER -->
<div class="filters">
  <select id="category" onchange="filterProducts()">
    <option value="">Category</option>
  </select>

  <select id="priceFilter" onchange="filterProducts()">
    <option value="">Price</option>
    <option value="0-99">0-99</option>
    <option value="0-299">0-299</option>
    <option value="300-599">300-599</option>
    <option value="599+">599+</option>
  </select>
</div>

<!-- PRODUCTS -->
<div id="products">Loading...</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div>🏠 Home</div>
  <div>📦 Orders</div>
  <div>➕ Sell</div>
  <div>👤 Account</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let allProducts = [];

load();

async function load(){
  const { data, error } = await client.from("products").select("*");

  if(error){
    document.getElementById("products").innerHTML = error.message;
    return;
  }

  allProducts = data || [];
  loadCategories();
  show(allProducts);
}

function loadCategories(){
  let box = document.getElementById("category");
  let cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))];

  cats.forEach(c=>{
    box.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

function show(data){
  let box = document.getElementById("products");
  box.innerHTML = "";

  data.forEach(p=>{
    box.innerHTML += `
      <div class="card" onclick="openProduct('${p.id}')">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
      </div>
    `;
  });
}

function filterProducts(){
  let search = document.getElementById("search").value.toLowerCase();
  let category = document.getElementById("category").value;
  let priceRange = document.getElementById("priceFilter").value;

  let filtered = allProducts.filter(p => {
    let price = Number(p.price);
    let ok = true;

    if(priceRange === "0-99") ok = price <= 99;
    else if(priceRange === "0-299") ok = price <= 299;
    else if(priceRange === "300-599") ok = price >= 300 && price <= 599;
    else if(priceRange === "599+") ok = price >= 599;

    return (!search || p.name?.toLowerCase().includes(search))
      && (!category || p.category === category)
      && ok;
  });

  show(filtered);
}

function openProduct(id){
  window.location.href = "view.html?id=" + id;
}
</script>

</body>
</html>
