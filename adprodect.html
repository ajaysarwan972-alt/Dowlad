<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  background:#1e88e5;
  color:white;
  padding:15px;
  text-align:center;
}

/* 🔥 1 ROW - 2 COLUMNS */
.row{
  display:flex;
  gap:10px;
  padding:10px;
}

.box{
  flex:1;
  background:#fff;
  padding:10px;
  border-radius:10px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  background:#1e88e5;
  color:white;
  border-radius:10px;
}

/* PREVIEW */
.preview{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-top:10px;
}

.preview img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="header">➕ Add Product</div>

<!-- 🔥 ROW -->
<div class="row">

  <!-- SINGLE IMAGE -->
  <div class="box">
    <h4>Main Image</h4>
    <input type="file" id="mainImg" accept="image/*" onchange="previewMain()">
    <div class="preview" id="mainPreview"></div>
  </div>

  <!-- MULTI IMAGE -->
  <div class="box">
    <h4>Gallery Images</h4>
    <input type="file" id="multiImg" multiple accept="image/*" onchange="previewMulti()">
    <div class="preview" id="multiPreview"></div>
  </div>

</div>

<!-- DETAILS -->
<div style="padding:10px;">
  <input id="name" placeholder="Product Name">
  <input id="price" placeholder="Price">
  <textarea id="desc" placeholder="Description"></textarea>

  <button onclick="save()">Save Product</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let mainImageUrl = "";
let galleryUrls = [];

/* MAIN PREVIEW */
function previewMain(){
  let file = document.getElementById("mainImg").files[0];
  let box = document.getElementById("mainPreview");

  box.innerHTML = `<img src="${URL.createObjectURL(file)}">`;
}

/* MULTI PREVIEW */
function previewMulti(){
  let files = document.getElementById("multiImg").files;
  let box = document.getElementById("multiPreview");

  box.innerHTML = "";

  for(let i=0;i<files.length && i<10;i++){
    let img = document.createElement("img");
    img.src = URL.createObjectURL(files[i]);
    box.appendChild(img);
  }
}

/* UPLOAD */
async function upload(file){
  let name = Date.now()+"_"+file.name;

  await client.storage.from("products").upload(name,file);

  let {data} = client.storage.from("products").getPublicUrl(name);

  return data.publicUrl;
}

/* SAVE */
async function save(){

  let mainFile = document.getElementById("mainImg").files[0];
  let multiFiles = document.getElementById("multiImg").files;

  if(!mainFile){
    alert("Main image select karo");
    return;
  }

  mainImageUrl = await upload(mainFile);

  galleryUrls = [];

  for(let i=0;i<multiFiles.length;i++){
    let url = await upload(multiFiles[i]);
    galleryUrls.push(url);
  }

  await client.from("products").insert([{
    name:document.getElementById("name").value,
    price:document.getElementById("price").value,
    description:document.getElementById("desc").value,

    image: mainImageUrl,
    images: galleryUrls
  }]);

  alert("Product Saved 🚀");
}

</script>

</body>
</html>
