<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;}
.header{background:#1e88e5;color:#fff;padding:15px;text-align:center;}
.box{padding:15px;}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  background:#1e88e5;
  color:white;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">➕ Add Product</div>

<div class="box">

<input id="name" placeholder="Product Name">
<input id="price" type="number" placeholder="Price">
<input id="size" placeholder="Product Size">
<input id="brand" placeholder="Brand Name">
<input id="category" placeholder="Category">
<input id="whatsapp" placeholder="WhatsApp Number">

<textarea id="desc" placeholder="Description"></textarea>

<input type="file" id="image">

<button onclick="add()">Save Product</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl="https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey="YOUR_KEY";
const client=supabase.createClient(supabaseUrl,supabaseKey);

async function upload(file){
  let name=Date.now()+"_"+file.name;

  await client.storage.from("products").upload(name,file);

  let {data}=client.storage.from("products").getPublicUrl(name);

  return data.publicUrl;
}

async function add(){

  let imgFile=document.getElementById("image").files[0];
  let imgUrl=await upload(imgFile);

  await client.from("products").insert([{
    name:document.getElementById("name").value,
    price:document.getElementById("price").value,
    size:document.getElementById("size").value,
    brand:document.getElementById("brand").value,
    category:document.getElementById("category").value,
    whatsapp:document.getElementById("whatsapp").value,
    description:document.getElementById("desc").value,
    image:imgUrl
  }]);

  alert("Product Added 🚀");
  location.reload();
}

</script>

</body>
</html>
