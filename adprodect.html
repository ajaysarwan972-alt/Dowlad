<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;}
.header{background:#1e88e5;color:white;padding:15px;text-align:center;}
.box{padding:15px;}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  background:#1e88e5;
  color:white;
  border-radius:10px;
}

.preview-box{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-top:10px;
}

.preview-box img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="header">➕ Add Product</div>

<div class="box">

<input id="name" placeholder="Product Name">
<input id="price" type="number" placeholder="Price">
<input id="size" placeholder="Product Size">
<input id="brand" placeholder="Brand Name">
<input id="category" placeholder="Category">
<input id="whatsapp" placeholder="WhatsApp Number">

<textarea id="desc" placeholder="Description"></textarea>

<input type="file" id="images" multiple accept="image/*" onchange="previewImages()">

<div class="preview-box" id="preview"></div>

<button onclick="add()">Save Product</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* 🔥 YOUR SUPABASE CONFIG */
const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "PASTE_YOUR_KEY_HERE";

const client = supabase.createClient(supabaseUrl, supabaseKey);

/* PREVIEW */
function previewImages(){
  let files = document.getElementById("images").files;
  let box = document.getElementById("preview");

  box.innerHTML="";

  for(let i=0;i<files.length && i<10;i++){
    let img = document.createElement("img");
    img.src = URL.createObjectURL(files[i]);
    box.appendChild(img);
  }
}

/* UPLOAD */
async function uploadImages(files){

  let urls=[];
  let count=Math.min(files.length,10);

  for(let i=0;i<count;i++){

    let file = files[i];
    let fileName = Date.now()+"_"+file.name;

    await client.storage.from("products").upload(fileName,file);

    let {data} = client.storage.from("products").getPublicUrl(fileName);

    urls.push(data.publicUrl);
  }

  return urls;
}

/* SAVE PRODUCT */
async function add(){

  let files = document.getElementById("images").files;

  if(files.length === 0){
    alert("Select images");
    return;
  }

  let imgUrls = await uploadImages(files);

  let mainImage = imgUrls[0];
  let gallery = imgUrls.slice(1);

  const {error} = await client.from("products").insert([{
    name:document.getElementById("name").value,
    price:document.getElementById("price").value,
    size:document.getElementById("size").value,
    brand:document.getElementById("brand").value,
    category:document.getElementById("category").value,
    whatsapp:document.getElementById("whatsapp").value,
    description:document.getElementById("desc").value,

    image: mainImage,
    images: gallery
  }]);

  if(error){
    alert(error.message);
  }else{
    alert("Product Added 🚀");
    location.reload();
  }
}

</script>

</body>
</html>
