<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;}
.header{background:#1e88e5;color:white;padding:15px;text-align:center;}
.box{padding:15px;}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  background:#1e88e5;
  color:white;
  border-radius:10px;
}

.preview-box{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-top:10px;
}

.preview-box img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:8px;
}

/* 🔥 SAVED IMAGES SECTION */
.saved-box{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  gap:5px;
}

.saved-box img{
  width:70px;
  height:70px;
  border-radius:8px;
  object-fit:cover;
}
</style>
</head>

<body>

<div class="header">➕ Add Product</div>

<div class="box">

<input id="name" placeholder="Product Name">
<input id="price" type="number" placeholder="Price">
<input id="size" placeholder="Size">
<input id="brand" placeholder="Brand">
<input id="category" placeholder="Category">
<input id="whatsapp" placeholder="WhatsApp">

<textarea id="desc" placeholder="Description"></textarea>

<input type="file" id="images" multiple accept="image/*" onchange="previewImages()">

<div class="preview-box" id="preview"></div>

<button onclick="add()">Save Product</button>

<!-- 🔥 NICHÉ SAVED IMAGES SHOW -->
<div class="saved-box" id="savedBox"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const client = supabase.createClient(supabaseUrl, supabaseKey);

/* PREVIEW */
function previewImages(){
  let files = document.getElementById("images").files;
  let box = document.getElementById("preview");

  box.innerHTML = "";

  for(let i=0;i<files.length && i<10;i++){
    let img = document.createElement("img");
    img.src = URL.createObjectURL(files[i]);
    box.appendChild(img);
  }
}

/* UPLOAD */
async function uploadImages(files){

  let urls = [];
  let limit = Math.min(files.length,10);

  for(let i=0;i<limit;i++){

    let file = files[i];
    let fileName = Date.now()+"_"+file.name;

    await client.storage.from("products").upload(fileName,file);

    let {data} = client.storage.from("products").getPublicUrl(fileName);

    urls.push(data.publicUrl);
  }

  return urls;
}

/* SAVE */
async function add(){

  let files = document.getElementById("images").files;

  let urls = await uploadImages(files);

  await client.from("products").insert([{
    name:document.getElementById("name").value,
    price:document.getElementById("price").value,
    size:document.getElementById("size").value,
    brand:document.getElementById("brand").value,
    category:document.getElementById("category").value,
    whatsapp:document.getElementById("whatsapp").value,
    description:document.getElementById("desc").value,
    image:urls[0],
    images:urls
  }]);

  alert("Saved 🚀");

  showSaved(urls); // 🔥 ab niche images show hongi
}

/* 🔥 SHOW SAVED IMAGES */
function showSaved(urls){

  let box = document.getElementById("savedBox");
  box.innerHTML = "";

  urls.forEach(url=>{
    let img = document.createElement("img");
    img.src = url;
    box.appendChild(img);
  });
}

</script>

</body>
</html>
